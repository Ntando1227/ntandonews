{% extends "base/base.html" %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p>Join Ntando's News as a reader.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn-primary full-width">Register</button>
        </form>
    </div>
</section>
{% endblock %}
