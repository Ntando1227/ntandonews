{% extends "base/base.html" %}

{% block content %}

<section class="article-detail">

    <div class="container narrow">

        <p class="eyebrow">
            Review Submission
        </p>

        <h1>
            {{ article.title }}
        </h1>

        <p class="article-meta">
            By {{ article.author.username|default:"External Source" }}
            |
            {{ article.published_at|date:"d M Y H:i" }}
        </p>

        <div class="article-content">
            {{ article.content|linebreaks }}
        </div>

        <form method="post" class="approval-box">

            {% csrf_token %}

            <button type="submit" class="btn-primary">
                Approve and Publish
            </button>

            <a href="{% url 'editor_dashboard' %}" class="btn-dark">
                Back to Dashboard
            </a>

        </form>

    </div>

</section>

{% endblock %}
